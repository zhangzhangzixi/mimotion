name: walking

on:
  schedule:
    - cron: '58 22 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout codes
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }} #此处PAT需要申请，教程详见：README
      - name: Update system and install zsh
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get install zsh -y
          
      - name: 初始化Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          
      - name: 开始
        env:
            CONFIG: ${{ secrets.CONFIG }}
            AES_KEY: ${{ secrets.AES_KEY }}
        run: |
          pip3 install requests pytz pycryptodome

          NOW=$(date +%s)
          TODAY_8AM=$(date -d "today 00:00" +%s)

          echo "[$(date '+%F %T')] 当前时间检测"

          if [ "$NOW" -ge "$TODAY_8AM" ]; then
            DELAY=$((RANDOM % 10 + 5))
            echo "[$(date '+%F %T')] 已 ≥08:00，延迟 ${DELAY}s 后执行"
            sleep "$DELAY"
          else
            TARGET=$((TODAY_8AM + RANDOM % 10 + 5))
            DELAY=$((TARGET - NOW))
            echo "[$(date '+%F %T')] 未到 08:00，等待 ${DELAY}s"
            sleep "$DELAY"
          fi

          echo "[$(date '+%F %T')] ✅ 开始执行任务"

          python3 main.py

      - name: persist tokens
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add .
          git commit -m "persist tokens trigger by ${{ github.event_name }}"
          git push origin master
