name: walking

on:
  schedule:
    - cron: '59 22 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout codes
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }} #此处PAT需要申请，教程详见：README
      - name: Update system and install zsh
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get install zsh -y
          
      - name: 初始化Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          
      - name: 开始
        env:
            CONFIG: ${{ secrets.CONFIG }}
            AES_KEY: ${{ secrets.AES_KEY }}
        run: |
          pip3 install requests pytz pycryptodome
          echo "[$(date '+%F %T')] 开始等待..." >> sleep.log
          start=$(date +%s)

          target=$(( $(date -d "tomorrow 00:00" +%s) + RANDOM % 10 + 5 ))
          now=$(date +%s)
          delay=$((target - now))

          echo "[$(date '+%F %T')] 将睡眠 ${delay} 秒" >> sleep.log
          sleep $delay

          echo "[$(date '+%F %T')] 结束等待" >> sleep.log
          python3 main.py

      - name: persist tokens
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add .
          git commit -m "persist tokens trigger by ${{ github.event_name }}"
          git push origin master
